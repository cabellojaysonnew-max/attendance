
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
<title>DAR Attendance</title>
</head>
<body>

<div class="container">

<h2>Attendance</h2>

<div class="card">
<b id="empName"></b><br>
<small id="empPosition"></small>
</div>

<div class="card">
<button onclick="clock()">CLOCK IN / OUT</button>
<p id="status" class="success"></p>
<p id="error" class="error"></p>
</div>

<div class="card">
<h3>Recent Mobile Logs</h3>
<div id="logs"></div>
</div>

<div class="card">
<h3>System Status</h3>
<pre id="debug" style="font-size:12px;background:#111;color:#0f0;padding:10px;border-radius:8px;height:150px;overflow:auto;">READY</pre>
</div>

</div>

<script src="supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
