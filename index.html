
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DAR Attendance</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#006400">
</head>

<body>
<div class="container">

<h1>DAR Attendance</h1>

<input id="emp_id" placeholder="Employee Number">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script type="module" src="login.js"></script>
 <script>

if(!window.matchMedia('(display-mode: standalone)').matches){
 alert("Please install the DAR Attendance app on your phone for security.")
}

</script>

<script>
const emp = localStorage.getItem("emp_id")
const exp = localStorage.getItem("session_expire")

if(emp && exp){
 if(Date.now() < exp){
   location.href="dashboard.html"
 }
}
</script>

</body>
</html>
